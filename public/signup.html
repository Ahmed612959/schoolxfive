<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <!-- ====================== الحماية المتكاملة للصفحة ====================== -->
<script>
    (function() {
        'use strict';
        
        // ========== 1. منع فتح أدوات المطور بجميع الطرق ==========
        
        // قائمة بجميع اختصارات فتح أدوات المطور
        const devToolsShortcuts = [
            'F12',                           // F12
            'F11',                           // F11
            'F10',                           // F10
            'F9',                            // F9
            'F8',                            // F8
            'F7',                            // F7
            'F6',                            // F6
            'F5',                            // F5 (منع التحديث السريع)
            'I', 'i',                        // Ctrl+Shift+I
            'J', 'j',                        // Ctrl+Shift+J
            'C', 'c',                        // Ctrl+Shift+C
            'U', 'u',                        // Ctrl+U (View Source)
            'S', 's',                        // Ctrl+S (Save Page)
            'P', 'p',                        // Ctrl+P (Print)
            'K', 'k',                        // Ctrl+Shift+K (Firefox)
            'E', 'e',                        // Ctrl+Shift+E (Firefox)
            'O', 'o'                         // Ctrl+O (Open)
        ];
        
        // منع جميع الاختصارات
        document.addEventListener('keydown', function(e) {
            // منع المفاتيح المفردة
            if (devToolsShortcuts.includes(e.key)) {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }
            
            // منع اختصارات Ctrl + أي مفتاح
            if (e.ctrlKey || e.metaKey) {
                const key = e.key.toLowerCase();
                const forbidden = ['u', 's', 'p', 'o', 'i', 'j', 'c', 'k', 'e', 'r', 'f5'];
                if (forbidden.includes(key) || key === 'f5') {
                    e.preventDefault();
                    e.stopPropagation();
                    return false;
                }
            }
            
            // منع Ctrl+Shift+ أي مفتاح
            if (e.ctrlKey && e.shiftKey) {
                const key = e.key.toLowerCase();
                const forbidden = ['i', 'j', 'c', 'k', 'e', 'r'];
                if (forbidden.includes(key)) {
                    e.preventDefault();
                    e.stopPropagation();
                    return false;
                }
            }
            
            // منع Alt+ أي مفتاح (بعض المتصفحات)
            if (e.altKey) {
                const key = e.key.toLowerCase();
                const forbidden = ['f12', 'f11', 'f10', 'f9', 'f8', 'f7', 'f6', 'f5'];
                if (forbidden.includes(key)) {
                    e.preventDefault();
                    e.stopPropagation();
                    return false;
                }
            }
        });
        
        // ========== 2. منع النقر بزر الماوس الأيمن ==========
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            e.stopPropagation();
            return false;
        });
        
        // ========== 3. منع تحديد النص ونسخه ==========
        document.addEventListener('selectstart', function(e) {
            e.preventDefault();
            return false;
        });
        
        document.addEventListener('copy', function(e) {
            e.preventDefault();
            e.stopPropagation();
            return false;
        });
        
        document.addEventListener('cut', function(e) {
            e.preventDefault();
            e.stopPropagation();
            return false;
        });
        
        document.addEventListener('paste', function(e) {
            // السماح باللصق في الحقول فقط
            const target = e.target;
            if (target.tagName === 'INPUT' || target.tagName === 'TEXTAREA' || target.tagName === 'SELECT') {
                return true;
            }
            e.preventDefault();
            return false;
        });
        
        // ========== 4. منع السحب ==========
        document.addEventListener('dragstart', function(e) {
            e.preventDefault();
            return false;
        });
        
        // ========== 5. تعطيل Console بالكامل ==========
        if (typeof console !== 'undefined') {
            const noop = function() {};
            const consoleMethods = [
                'log', 'warn', 'error', 'info', 'debug', 'trace', 'dir', 'dirxml',
                'group', 'groupEnd', 'groupCollapsed', 'profile', 'profileEnd',
                'time', 'timeEnd', 'timeStamp', 'clear', 'count', 'countReset',
                'assert', 'table', 'memory'
            ];
            
            consoleMethods.forEach(method => {
                if (console[method]) {
                    console[method] = noop;
                }
            });
            
            // تعطيل console.log بشكل خاص
            window.console = {
                ...console,
                log: noop,
                warn: noop,
                error: noop,
                info: noop,
                debug: noop
            };
        }
        
        // ========== 6. كشف فتح أدوات المطور المتقدم ==========
        let devToolsOpenCount = 0;
        let devToolsDetected = false;
        
        // طريقة 1: كشف عبر debugger
        setInterval(function() {
            const start = performance.now();
            debugger;
            const end = performance.now();
            if (end - start > 100 && !devToolsDetected) {
                devToolsDetected = true;
                devToolsOpenCount++;
                if (devToolsOpenCount >= 2) {
                    document.body.innerHTML = `
                        <div style="position:fixed;top:0;left:0;right:0;bottom:0;background:white;z-index:999999;display:flex;align-items:center;justify-content:center;flex-direction:column;font-family:Tajawal,monospace;text-align:center;padding:20px;">
                            <i class="fas fa-shield-alt" style="font-size:80px;color:#d4af37;margin-bottom:20px;"></i>
                            <h2 style="color:#1a4f6e;">🔒 تم تعطيل أدوات المطور</h2>
                            <p style="color:#64748b;margin-top:10px;">الرجاء إغلاق أدوات المطور للمتابعة</p>
                            <button onclick="location.reload()" style="margin-top:20px;padding:10px 30px;background:#d4af37;border:none;border-radius:25px;cursor:pointer;font-family:Tajawal;">إعادة تحميل الصفحة</button>
                        </div>
                    `;
                    document.body.style.overflow = 'hidden';
                }
            }
        }, 500);
        
        // طريقة 2: كشف عبر تغيير حجم النافذة
        let lastWidth = window.innerWidth;
        let lastHeight = window.innerHeight;
        
        setInterval(function() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            
            if (Math.abs(width - lastWidth) > 100 || Math.abs(height - lastHeight) > 100) {
                if (!devToolsDetected) {
                    devToolsDetected = true;
                    setTimeout(() => {
                        if (!devToolsDetected) return;
                        document.body.innerHTML = `
                            <div style="position:fixed;top:0;left:0;right:0;bottom:0;background:white;z-index:999999;display:flex;align-items:center;justify-content:center;flex-direction:column;font-family:Tajawal,monospace;text-align:center;">
                                <i class="fas fa-shield-alt" style="font-size:80px;color:#d4af37;margin-bottom:20px;"></i>
                                <h2 style="color:#1a4f6e;">🚫 تم اكتشاف أدوات المطور</h2>
                                <p style="color:#64748b;">تم تعطيل الصفحة للحماية</p>
                                <button onclick="location.reload()" style="margin-top:20px;padding:10px 30px;background:#d4af37;border:none;border-radius:25px;cursor:pointer;">إعادة تحميل الصفحة</button>
                            </div>
                        `;
                        document.body.style.overflow = 'hidden';
                    }, 500);
                }
            }
            lastWidth = width;
            lastHeight = height;
        }, 1000);
        
        // طريقة 3: كشف عبر Object.defineProperty
        try {
            const element = new Image();
            Object.defineProperty(element, 'id', {
                get: function() {
                    if (!devToolsDetected) {
                        devToolsDetected = true;
                        document.body.innerHTML = `
                            <div style="position:fixed;top:0;left:0;right:0;bottom:0;background:white;z-index:999999;display:flex;align-items:center;justify-content:center;flex-direction:column;font-family:Tajawal,monospace;text-align:center;">
                                <i class="fas fa-shield-alt" style="font-size:80px;color:#d4af37;margin-bottom:20px;"></i>
                                <h2 style="color:#1a4f6e;">🔒 تم تعطيل أدوات المطور</h2>
                                <p style="color:#64748b;">الرجاء إغلاق أدوات المطور للمتابعة</p>
                                <button onclick="location.reload()">إعادة التحميل</button>
                            </div>
                        `;
                        document.body.style.overflow = 'hidden';
                    }
                }
            });
        } catch(e) {}
        
        // ========== 7. منع View Source ==========
        // منع Ctrl+U
        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && (e.key === 'u' || e.key === 'U')) {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }
        });
        
        // منع عرض المصدر من قائمة المتصفح (حماية إضافية)
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) {
                e.preventDefault();
                return false;
            }
        });
        
        // ========== 8. منع حفظ الصفحة ==========
        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && (e.key === 's' || e.key === 'S')) {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }
        });
        
        // ========== 9. منع الطباعة ==========
        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && (e.key === 'p' || e.key === 'P')) {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }
        });
        
        // ========== 10. منع التقاط الصور للشاشة ==========
        // منع PrintScreen
        document.addEventListener('keyup', function(e) {
            if (e.key === 'PrintScreen') {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }
        });
        
        // ========== 11. حماية الصور من السحب ==========
        document.querySelectorAll('img').forEach(img => {
            img.setAttribute('draggable', 'false');
            img.addEventListener('dragstart', (e) => {
                e.preventDefault();
                return false;
            });
            img.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                return false;
            });
        });
        
        // ========== 12. حماية النص المحدد ==========
        // إضافة تأثير شفاف عند محاولة التحديد
        document.body.style.userSelect = 'none';
        document.body.style.webkitUserSelect = 'none';
        document.body.style.msUserSelect = 'none';
        
        // السماح بالتحديد فقط في الحقول
        const inputs = document.querySelectorAll('input, textarea, select');
        inputs.forEach(input => {
            input.style.userSelect = 'text';
            input.style.webkitUserSelect = 'text';
        });
        
        // ========== 13. تعطيل اختصارات المتصفح ==========
        window.addEventListener('beforeunload', function(e) {
            // منع F5 و Ctrl+F5 و Ctrl+R
            // يتم التعامل معها في keydown
        });
        
        // ========== 14. كشف محاولات إعادة توجيه Console ==========
        if (window.devtools && window.devtools.open) {
            document.body.innerHTML = `
                <div style="position:fixed;top:0;left:0;right:0;bottom:0;background:white;z-index:999999;display:flex;align-items:center;justify-content:center;flex-direction:column;">
                    <i class="fas fa-shield-alt" style="font-size:80px;color:#d4af37;"></i>
                    <h2>🔒 تم تعطيل أدوات المطور</h2>
                    <button onclick="location.reload()">إعادة تحميل الصفحة</button>
                </div>
            `;
            document.body.style.overflow = 'hidden';
        }
        
        // ========== 15. منع محاولات فتح الـ Console عبر القوائم ==========
        // إضافة طبقة شفافة فوق الصفحة لمنع بعض الهجمات
        const overlay = document.createElement('div');
        overlay.style.position = 'fixed';
        overlay.style.top = '0';
        overlay.style.left = '0';
        overlay.style.width = '100%';
        overlay.style.height = '100%';
        overlay.style.pointerEvents = 'none';
        overlay.style.zIndex = '-1';
        document.body.appendChild(overlay);
        
        console.log('🛡️ الحماية المتكاملة مفعلة بنجاح');
    })();
</script>
    <title>إنشاء حساب جديد - معهد رعاية الضبعية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <link rel="icon" type="image/png" href="/logo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(145deg, #e8eef4 0%, #dce5f0 100%);
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.03"><path fill="none" d="M20,20 L80,20 L80,80 L20,80 Z" stroke="%231a4f6e" stroke-width="1"/><circle cx="50" cy="50" r="15" stroke="%231a4f6e" stroke-width="1" fill="none"/></svg>');
            background-repeat: repeat;
            pointer-events: none;
            z-index: 0;
        }

        /* ====================== Header ====================== */
        .header {
            background: rgba(26, 79, 110, 0.95);
            backdrop-filter: blur(10px);
            padding: 12px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 2px solid #c4a35a;
            padding: 3px;
            background: white;
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .header h1 {
            font-size: 1.1rem;
            color: #c4a35a;
            font-weight: 700;
        }

        .login-btn {
            background: rgba(196, 163, 90, 0.2);
            color: #c4a35a;
            border: 1px solid #c4a35a;
            padding: 6px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            font-family: 'Tajawal', sans-serif;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .login-btn:hover {
            background: #c4a35a;
            color: #1a4f6e;
            transform: translateY(-2px);
        }

        /* ====================== Container ====================== */
        .container {
            max-width: 500px;
            margin: 40px auto;
            padding: 0 20px 60px;
            position: relative;
            z-index: 1;
        }

        /* ====================== Signup Card ====================== */
        .signup-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(5px);
            transition: transform 0.3s ease;
        }

        .signup-card:hover {
            transform: translateY(-5px);
        }

        .card-header {
            background: linear-gradient(135deg, #1a4f6e, #0d3b54);
            padding: 30px 25px 25px;
            text-align: center;
            position: relative;
        }

        .card-header .icon {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            border: 2px solid #c4a35a;
        }

        .card-header .icon i {
            font-size: 32px;
            color: #c4a35a;
        }

        .card-header h2 {
            color: white;
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .card-header p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.85rem;
        }

        /* ====================== Form ====================== */
        .form-section {
            padding: 30px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
        }

        .form-group {
            margin-bottom: 5px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        .form-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            font-weight: 600;
            color: #1a2526;
            font-size: 0.85rem;
        }

        .form-group label i {
            color: #c4a35a;
            width: 18px;
            font-size: 0.9rem;
        }

        .form-group label .required {
            color: #b91c1c;
            font-size: 0.8rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            font-size: 0.9rem;
            font-family: 'Tajawal', sans-serif;
            transition: all 0.3s ease;
            background: white;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #c4a35a;
            box-shadow: 0 0 0 4px rgba(196, 163, 90, 0.1);
        }

        .form-group input::placeholder {
            color: #aaa;
            font-size: 0.8rem;
        }

        .form-group small {
            color: #64748b;
            font-size: 0.7rem;
            margin-top: 5px;
            display: block;
        }

        .username-status {
            font-size: 0.75rem;
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .username-status.available {
            color: #2d6a4f;
        }

        .username-status.unavailable {
            color: #b91c1c;
        }

        .username-status.checking {
            color: #d97706;
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #c4a35a, #b8933e);
            color: #1a4f6e;
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Tajawal', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 25px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(196, 163, 90, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .form-footer {
            text-align: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #e2e8f0;
        }

        .form-footer p {
            color: #64748b;
            font-size: 0.85rem;
        }

        .form-footer a {
            color: #1a4f6e;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .form-footer a:hover {
            color: #c4a35a;
        }

        .main-footer {
            text-align: center;
            padding: 20px;
            color: #64748b;
            font-size: 0.75rem;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .main-footer .heart {
            color: #b91c1c;
        }

        /* ====================== الروبوت المتحرك الذكي ====================== */
        .live-robot {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 10001;
            cursor: pointer;
        }

        .robot-character {
            width: 100px;
            transition: all 0.3s ease;
            animation: robotFloat 3s ease-in-out infinite;
        }

        @keyframes robotFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .robot-character:hover {
            transform: scale(1.05);
        }

        .robot-head {
            position: relative;
            width: 80px;
            height: 75px;
            background: linear-gradient(145deg, #667eea, #764ba2);
            border-radius: 50% 50% 45% 45%;
            margin: 0 auto;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.3s;
        }

        .robot-face {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .robot-eyes {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }

        .robot-eye {
            width: 14px;
            height: 14px;
            background: white;
            border-radius: 50%;
            position: relative;
            transition: all 0.1s;
        }

        .robot-eye::after {
            content: '';
            position: absolute;
            width: 7px;
            height: 7px;
            background: #1a1a2e;
            border-radius: 50%;
            top: 3px;
            left: 4px;
            transition: all 0.1s;
        }

        .robot-mouth {
            margin-top: 8px;
        }

        .mouth-line {
            width: 25px;
            height: 3px;
            background: white;
            border-radius: 2px;
            transition: all 0.2s;
        }

        .robot-body {
            position: relative;
            width: 65px;
            height: 55px;
            background: linear-gradient(145deg, #5a6eea, #5a4ba2);
            border-radius: 20px;
            margin: -8px auto 0;
            padding: 8px;
        }

        .robot-screen {
            background: #0a0a2e;
            border-radius: 8px;
            padding: 5px;
            margin: 3px 0;
            min-height: 35px;
            border: 1px solid #00ff88;
        }

        .screen-text {
            color: #00ff88;
            font-size: 7px;
            text-align: center;
            font-family: monospace;
        }

        .robot-arms {
            position: relative;
            margin-top: -45px;
        }

        .robot-arm {
            position: absolute;
            width: 25px;
            height: 35px;
            background: linear-gradient(145deg, #667eea, #764ba2);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .left-arm {
            left: -25px;
            transform-origin: top right;
        }

        .right-arm {
            right: -25px;
            transform-origin: top left;
        }

        .arm-hand {
            font-size: 14px;
        }

        .robot-legs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: -5px;
        }

        .robot-leg {
            width: 15px;
            height: 20px;
            background: linear-gradient(145deg, #667eea, #764ba2);
            border-radius: 0 0 10px 10px;
        }

        .speech-bubble-live {
            position: absolute;
            bottom: 90px;
            right: 80px;
            background: white;
            border-radius: 20px;
            padding: 10px 15px;
            min-width: 180px;
            max-width: 250px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.3s ease;
            pointer-events: none;
            border: 2px solid #667eea;
        }

        .speech-bubble-live.show {
            opacity: 1;
            transform: scale(1);
        }

        .bubble-text-live {
            font-size: 12px;
            color: #1e293b;
            font-weight: 600;
            text-align: center;
        }

        .field-error {
            border-color: #ff4757 !important;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        @media (max-width: 640px) {
            .form-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .form-group.full-width {
                grid-column: span 1;
            }
            .container {
                margin: 20px auto;
                padding: 0 15px 80px;
            }
            .live-robot {
                transform: scale(0.8);
                bottom: 10px;
                right: 10px;
            }
            .speech-bubble-live {
                right: 60px;
                min-width: 150px;
            }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="header-logo">
        <img src="logo.png" alt="شعار المعهد" class="logo" onerror="this.style.display='none'">
        <h1><i class="fas fa-graduation-cap"></i> معهد رعاية الضبعية</h1>
    </div>
    <a href="login.html" class="login-btn">
        <i class="fas fa-sign-in-alt"></i>
        <span>تسجيل الدخول</span>
    </a>
</header>

<!-- الروبوت المتحرك الذكي -->
<div class="live-robot" id="liveRobot">
    <div class="robot-character">
        <div class="robot-head">
            <div class="robot-face">
                <div class="robot-eyes">
                    <div class="robot-eye left-eye"></div>
                    <div class="robot-eye right-eye"></div>
                </div>
                <div class="robot-mouth">
                    <div class="mouth-line"></div>
                </div>
            </div>
        </div>
        <div class="robot-body">
            <div class="robot-screen">
                <div class="screen-text" id="robotScreenMsg">مرحباً! 👋</div>
            </div>
        </div>
        <div class="robot-arms">
            <div class="robot-arm left-arm">
                <div class="arm-hand">✋</div>
            </div>
            <div class="robot-arm right-arm">
                <div class="arm-hand">✋</div>
            </div>
        </div>
        <div class="robot-legs">
            <div class="robot-leg"></div>
            <div class="robot-leg"></div>
        </div>
    </div>
    <div class="speech-bubble-live" id="speechBubble">
        <div class="bubble-text-live" id="bubbleMsg">أنا هنا لمساعدتك! 🤗</div>
    </div>
</div>

<div class="container">
    <div class="signup-card">
        <div class="card-header">
            <div class="icon">
                <i class="fas fa-user-plus"></i>
            </div>
            <h2>إنشاء حساب جديد</h2>
            <p>سجل بياناتك للانضمام إلى منصة التعلم</p>
        </div>
        
        <div class="form-section">
            <form id="signupForm">
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label><i class="fas fa-user"></i> الاسم الكامل <span class="required">*</span></label>
                        <input type="text" id="fullName" placeholder="مثال: أحمد محمد علي السيد" required>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-at"></i> اسم المستخدم <span class="required">*</span></label>
                        <input type="text" id="username" placeholder="3-20 حرف (أحرف وأرقام)" required>
                        <div id="usernameStatus" class="username-status"></div>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> كلمة المرور <span class="required">*</span></label>
                        <input type="password" id="password" placeholder="أدخل كلمة مرور قوية" required>
                        <small>يجب أن تكون 6 أحرف على الأقل</small>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-chalkboard-user"></i> الصف الدراسي <span class="required">*</span></label>
                        <select id="grade" required>
                            <option value="first">🎓 الصف الأول الثانوي</option>
                            <option value="second">📚 الصف الثاني الثانوي</option>
                            <option value="third">📖 الصف الثالث الثانوي</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-id-card"></i> آخر 7 أرقام من البطاقة <span class="required">*</span></label>
                        <input type="text" id="studentCode" maxlength="7" placeholder="آخر 7 أرقام" required>
                        <small>آخر 7 أرقام من بطاقة الطالب</small>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-phone-alt"></i> رقم الهاتف <span class="required">*</span></label>
                        <input type="tel" id="phone" placeholder="01012345678" required>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-user-friends"></i> ولي الأمر <span class="required">*</span></label>
                        <input type="text" id="parentName" placeholder="اسم الأب أو الأم رباعي" required>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-id-card"></i> رقم بطاقة ولي الأمر <span class="required">*</span></label>
                        <input type="text" id="parentId" maxlength="14" placeholder="14 رقم" required>
                        <small>رقم بطاقة ولي الأمر (14 رقم)</small>
                    </div>
                </div>
                
                <button type="submit" class="submit-btn" id="submitBtn">
                    <i class="fas fa-user-plus"></i>
                    إنشاء الحساب
                </button>
                
                <div class="form-footer">
                    <p>لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a></p>
                </div>
            </form>
        </div>
    </div>
</div>

<footer class="main-footer">
    <p>Developed by Ahmed Mousa <span class="heart">❤</span></p>
</footer>

<script src="signup.js"></script>
</body>
</html>
