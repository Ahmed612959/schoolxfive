      align-items: center;
      gap: 12px;
    }

    .main-header h1::before {

      color: #c4a35a;
    }

    }

      display: flex;
      align-items: center;
      gap: 8px;

      color: #1a4f6e;

    }

    }

    }

      font-weight: 600;
      margin-bottom: 8px;
      color: #1a4f6e;
      font-size: 0.85rem;
    }

    .input-group label i {

      margin-left: 8px;
    }

      padding: 12px 18px;
      border: 2px solid #e2e8f0;
      border-radius: 16px;
      font-family: inherit;
      font-size: 0.9rem;
      transition: all 0.25s ease;
      background: white;
    }

    .input-group input:focus {

      border-color: #c4a35a;

    }

      font-size: 0.7rem;
      margin-top: 6px;
      display: none;
      font-weight: 500;
    }

</head>

  // تطبيع النص للبحث المرن
  function normalizeArabic(str) {
    if (!str) return '';
    return str
      .replace(/[أإآا]/g, 'ا')
      .replace(/ة/g, 'ه')
      .replace(/ى/g, 'ي')
      .replace(/\s+/g, ' ')
      .replace(/(عبد)\s+(ال|اله)/g, '$1$2')
      .replace(/(عبد)\s+(الله)/g, '$1$2')
      .trim()
      .toLowerCase();
  }

  function getGradeClass(percentage) {
    if (percentage >= 85) return "grade-high";
    if (percentage >= 60) return "grade-medium";
    return "grade-low";
  }

  function calculatePercentage(grade, max) {
    return (grade / max) * 100;

    seatInput.classList.remove("error");
    
    const rawName = nameInput.value.trim();
    const rawSeat = seatInput.value.trim();
    
    let hasError = false;
    
    if (!rawName) {
      nameError.style.display = "block";
      nameInput.classList.add("error");
      hasError = true;
    }
    
    if (!rawSeat) {
      seatError.style.display = "block";
      seatInput.classList.add("error");
      hasError = true;
    }
    
    if (hasError) {
      document.getElementById("result-container").style.display = "none";
      document.getElementById("no-result").style.display = "none";
      return;
    }
    
    const normalizedInputName = normalizeArabic(rawName);
    const normalizedSeat = rawSeat;
    
    const student = results.find(s => {
      const normalizedStudentName = normalizeArabic(s.name);
      const seatMatch = (s.seat === normalizedSeat);
      const nameMatch = normalizedStudentName.includes(normalizedInputName);
      return seatMatch && nameMatch;
    });

    if (!student) {
      document.getElementById("no-result").style.display = "block";
      document.getElementById("result-container").style.display = "none";
      return;
    }

    document.getElementById("no-result").style.display = "none";
    
    // عرض معلومات الطالب
    document.getElementById("student-info").innerHTML = `
      <h2>${student.name}</h2>
      <p><i class="fas fa-id-card"></i> رقم الجلوس: ${student.seat}</p>
    `;

    // عرض المواد والدرجات
    const subjectsList = document.getElementById("subjects-list");
    subjectsList.innerHTML = "";
    
    let total = 0, maxTotal = 0;
    
    for (const sub in student.subjects) {
      const gradeStr = student.subjects[sub];
      const [grade, max] = gradeStr.split('/').map(x => parseFloat(x));
      const percentage = calculatePercentage(grade, max);
      const gradeClass = getGradeClass(percentage);
      
      subjectsList.innerHTML += `
        <div class="subject-item">
          <div class="subject-name">
            <i class="fas ${icons[sub] || 'fa-book'}"></i>
            <span>${sub}</span>
          </div>
          <div class="subject-grade ${gradeClass}">${grade} / ${max}</div>
        </div>
      `;
      
      total += grade;
      maxTotal += max;
    }
    
    const percentage = (total / maxTotal * 100).toFixed(1);
    let percentageClass = "";
    if (percentage >= 85) percentageClass = "grade-high";
    else if (percentage >= 60) percentageClass = "grade-medium";
    else percentageClass = "grade-low";
    
    document.getElementById("total-box").innerHTML = `
      <span><i class="fas fa-calculator"></i> المجموع الكلي</span>
      <span>${total} / ${maxTotal}</span>
    `;
    
    document.getElementById("percentage-box").innerHTML = `
      <div class="percentage-value ${percentageClass}">${percentage}%</div>
      <div class="percentage-label">النسبة المئوية</div>
    `;
    
    // حساب الترتيب
    const sorted = results.map(s => {
      let sum = 0, maxSum = 0;
      for (const sub in s.subjects) {
        const [a, b] = s.subjects[sub].split('/').map(x => parseFloat(x));
        sum += a;
        maxSum += b;
      }
      return { name: s.name, percent: (sum / maxSum * 100).toFixed(1) };
    }).sort((a, b) => b.percent - a.percent);
    
    const rankIndex = sorted.findIndex(s => s.name === student.name) + 1;
    
    document.getElementById("rank-box").innerHTML = `
      <i class="fas fa-trophy"></i> ترتيب الطالب على الدفعة: <span>${rankIndex} / ${results.length}</span>
    `;
    
    document.getElementById("result-container").style.display = "block";
  }

  function shareWhatsApp() {
    const nameInput = document.getElementById("student-name");
    const seatInput = document.getElementById("seat-number");
    const rawName = nameInput.value.trim();
    const rawSeat = seatInput.value.trim();
    
    if (!rawName || !rawSeat) return;
    
    const normalizedInputName = normalizeArabic(rawName);
    
    const student = results.find(s => {
      const normalizedStudentName = normalizeArabic(s.name);
      const seatMatch = (s.seat === rawSeat);
      const nameMatch = normalizedStudentName.includes(normalizedInputName);
      return seatMatch && nameMatch;
    });
    
    if (!student) return;
    
    let msg = `📊 *نتيجة الطالب ${student.name}*%0A📋 رقم الجلوس: ${student.seat}%0A%0A`;
    let total = 0, maxTotal = 0;
    
    for (const sub in student.subjects) {
      const gradeStr = student.subjects[sub];
      const [grade, max] = gradeStr.split('/').map(x => parseFloat(x));
      msg += `📌 ${sub}: ${grade} / ${max}%0A`;
      total += grade;
      maxTotal += max;
    }
    
    const percentage = (total / maxTotal * 100).toFixed(1);
    msg += `%0A📊 *المجموع: ${total} / ${maxTotal}*%0A📈 *النسبة: ${percentage}%*`;
    
    window.open(`https://wa.me/?text=${msg}`, '_blank');
  }

  // تسجيل الخروج
  function logout() {
    if (confirm('هل تريد تسجيل الخروج؟')) {
      sessionStorage.clear();
      window.location.href = 'login.html';
    }
  }

  // البحث عند الضغط على Enter
  document.getElementById("student-name").addEventListener("keypress", (e) => {
    if (e.key === "Enter") searchResult();
  });
  document.getElementById("seat-number").addEventListener("keypress", (e) => {
    if (e.key === "Enter") searchResult();
  });

  // إخفاء رسائل الخطأ عند الكتابة
  document.getElementById("student-name").addEventListener("input", function() {
    document.getElementById("name-error").style.display = "none";
    this.classList.remove("error");
  });
  
  document.getElementById("seat-number").addEventListener("input", function() {
    document.getElementById("seat-error").style.display = "none";
    this.classList.remove("error");
  });
</script>
</body>
