<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المساعد الذكي - معهد رعاية الضبعية</title>
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" />
    <style>
        .chat-container { max-width: 800px; margin: 0 auto; background: white; border-radius: 15px; overflow: hidden; border: 1px solid #d4af37; }
        .chat-messages { height: 500px; overflow-y: auto; padding: 20px; background: #f8f9fa; }
        .message { margin-bottom: 15px; display: flex; align-items: flex-start; gap: 10px; }
        .message.user { flex-direction: row-reverse; }
        .message.user .bubble { background: #d4af37; color: #1a2526; }
        .message.bot .bubble { background: #1a2526; color: #d4af37; }
        .bubble { max-width: 70%; padding: 12px 18px; border-radius: 18px; word-wrap: break-word; line-height: 1.5; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #d4af37; display: flex; align-items: center; justify-content: center; color: #1a2526; }
        .chat-input { padding: 15px; background: white; border-top: 1px solid #ddd; display: flex; gap: 10px; }
        .chat-input input { flex: 1; padding: 12px; border: 2px solid #d4af37; border-radius: 25px; outline: none; font-size: 1rem; }
        .chat-input button { padding: 12px 25px; background: #d4af37; color: #1a2526; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; }
        .typing { display: inline-block; width: 20px; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .suggestions { display: flex; gap: 10px; padding: 10px; flex-wrap: wrap; justify-content: center; background: #fff; }
        .suggestion { background: #e0e0e0; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 0.9rem; }
    </style>
</head>
<body>
    <header class="main-header">
        <img src="logo.png" alt="شعار المعهد" class="logo">
        <h1>🤖 المساعد الذكي - اسأل عن أي شيء</h1>
        <button class="logout-btn" onclick="logout()">تسجيل الخروج</button>
    </header>

    <div class="admin-container">
        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <div class="message bot">
                    <div class="avatar"><i class="fas fa-robot"></i></div>
                    <div class="bubble">
                        👋 مرحباً! أنا المساعد الذكي للمعهد.<br>
                        اسألني عن أي شيء يتعلق بالمعهد، المواد الدراسية، أو أي معلومات في ملفات المعهد.
                    </div>
                </div>
            </div>
            <div class="suggestions">
                <div class="suggestion" onclick="askSuggestion('ما هي مواد الدراسة في معهد التمريض؟')">📚 مواد الدراسة</div>
                <div class="suggestion" onclick="askSuggestion('ما هي شروط القبول في المعهد؟')">📋 شروط القبول</div>
                <div class="suggestion" onclick="askSuggestion('ما هي مواعيد الدراسة؟')">⏰ مواعيد الدراسة</div>
                <div class="suggestion" onclick="askSuggestion('ما هي نسب النجاح؟')">📊 نسب النجاح</div>
            </div>
            <div class="chat-input">
                <input type="text" id="questionInput" placeholder="اكتب سؤالك هنا..." onkeypress="if(event.key==='Enter') askQuestion()">
                <button onclick="askQuestion()"><i class="fas fa-paper-plane"></i> إرسال</button>
            </div>
        </div>
    </div>

    <script>
        let isLoading = false;
        
        function addMessage(text, isUser = false) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;
            messageDiv.innerHTML = `
                <div class="avatar">${isUser ? '<i class="fas fa-user"></i>' : '<i class="fas fa-robot"></i>'}</div>
                <div class="bubble">${text.replace(/\n/g, '<br>')}</div>
            `;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function addTypingIndicator() {
            const messagesDiv = document.getElementById('chatMessages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `<div class="avatar"><i class="fas fa-robot"></i></div><div class="bubble">جاري التفكير <span class="typing">...</span></div>`;
            messagesDiv.appendChild(typingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function removeTypingIndicator() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }
        
        async function askQuestion() {
            if (isLoading) return;
            const input = document.getElementById('questionInput');
            const question = input.value.trim();
            if (!question) return;
            
            isLoading = true;
            addMessage(question, true);
            input.value = '';
            addTypingIndicator();
            
            try {
                const response = await fetch('/api/ai/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question })
                });
                const data = await response.json();
                removeTypingIndicator();
                addMessage(data.answer);
            } catch (error) {
                removeTypingIndicator();
                addMessage("⚠️ عذراً، حدث خطأ في الاتصال بالخادم. حاول مرة أخرى.");
            }
            isLoading = false;
        }
        
        function askSuggestion(question) {
            document.getElementById('questionInput').value = question;
            askQuestion();
        }
        
        window.logout = function() { localStorage.removeItem('loggedInUser'); window.location.href = 'login.html'; };
        window.askQuestion = askQuestion;
    </script>
</body>
</html>
