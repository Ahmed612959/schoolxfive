<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>تسجيل دخول ولي الأمر - معهد رعاية الضبعية</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <link rel="icon" type="image/png" href="/logo.png">
    <style>
        /* تنسيقات إضافية خاصة بصفحة ولي الأمر */
        .parent-badge {
            background: linear-gradient(135deg, #2d6a4f, #1b4d3b);
            color: white;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.7rem;
            display: inline-block;
            margin-top: 10px;
        }
        
        .info-box {
            background: #f8fafc;
            border-radius: 16px;
            padding: 15px;
            margin-top: 20px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }
        
        .info-box i {
            color: #d4af37;
            font-size: 1.2rem;
            margin-bottom: 8px;
        }
        
        .info-box p {
            font-size: 0.8rem;
            color: #64748b;
            margin: 0;
        }
        
        .student-link {
            text-align: center;
            margin-top: 15px;
        }
        
        .student-link a {
            color: #1a4f6e;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }
        
        .student-link a:hover {
            color: #d4af37;
            transform: translateX(-3px);
        }
    </style>
    <!-- حماية متطورة -->
<script>
    (function() {
        // منع جميع طرق فتح Page Source
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || 
                (e.ctrlKey && e.key === 'u') || 
                (e.ctrlKey && e.key === 'U') ||
                (e.ctrlKey && e.shiftKey && e.key === 'I') ||
                (e.ctrlKey && e.shiftKey && e.key === 'C') ||
                (e.ctrlKey && e.shiftKey && e.key === 'J')) {
                e.preventDefault();
                return false;
            }
        });
        
        // منع النقر الأيمن
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });
        
        // منع التحديد والنسخ
        document.addEventListener('selectstart', function(e) {
            e.preventDefault();
            return false;
        });
        
        document.addEventListener('copy', function(e) {
            e.preventDefault();
            return false;
        });
        
        // تعطيل Console تماماً
        if (typeof console !== 'undefined') {
            console.log = console.warn = console.error = console.info = console.debug = function() {};
        }
        
        // كشف محاولة فتح DevTools
        let devToolsDetected = false;
        setInterval(function() {
            const start = performance.now();
            debugger;
            const end = performance.now();
            if (end - start > 100 && !devToolsDetected) {
                devToolsDetected = true;
                document.body.innerHTML = `
                    <div style="position:fixed;top:0;left:0;right:0;bottom:0;background:white;z-index:999999;display:flex;align-items:center;justify-content:center;flex-direction:column;font-family:Tajawal,monospace;text-align:center;">
                        <i class="fas fa-shield-alt" style="font-size:80px;color:#d4af37;margin-bottom:20px;"></i>
                        <h2 style="color:#1a4f6e;">🔒 تم تعطيل أدوات المطور</h2>
                        <p style="color:#64748b;margin-top:10px;">الرجاء إغلاق أدوات المطور للمتابعة</p>
                        <button onclick="location.reload()" style="margin-top:20px;padding:10px 30px;background:#d4af37;border:none;border-radius:25px;cursor:pointer;">إعادة تحميل الصفحة</button>
                    </div>
                `;
                document.body.style.overflow = 'hidden';
            }
        }, 500);
    })();
</script>
</head>
<body>
    <header class="main-header">
        <img src="logo.png" alt="شعار معهد رعاية الضبعية" class="logo">
        <h1>نظام إدارة المعهد</h1>
    </header>

    <div class="main-container">
        <div class="login-form-container">
            <div class="login-icon">
                <i class="fas fa-user-friends"></i>
            </div>
            <h2>تسجيل دخول ولي الأمر</h2>
            <div class="parent-badge">
                <i class="fas fa-shield-alt"></i> متابعة أبنائك
            </div>
            
            <div id="message-container"></div>
            
            <form id="parent-login-form">
                <div class="input-group">
                    <label><i class="fas fa-id-card"></i> رقم بطاقة ولي الأمر</label>
                    <input type="text" id="parentId" name="parentId" placeholder="أدخل رقم البطاقة (14 رقم)" maxlength="14" required>
                    <small style="color: #64748b; font-size: 0.7rem; display: block; margin-top: 5px;">أدخل رقم بطاقة ولي الأمر المكون من 14 رقم</small>
                </div>
                
                <div class="input-group">
                    <label><i class="fas fa-lock"></i> كلمة المرور</label>
                    <input type="password" id="password" name="password" placeholder="أدخل كلمة المرور" required>
                    <small style="color: #64748b; font-size: 0.7rem; display: block; margin-top: 5px;">كلمة المرور: آخر 7 أرقام من بطاقة الطالب</small>
                </div>
                
                <button type="submit" class="submit-btn">
                    <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
                </button>
                
                <div class="info-box">
                    <i class="fas fa-info-circle"></i>
                    <p>يمكنك متابعة نتيجة ابنك وحضوره وإنذاراته</p>
                </div>
                
                <div class="student-link">
                    <a href="login.html"><i class="fas fa-user-graduate"></i> تسجيل دخول الطالب</a>
                </div>
                
                <div class="signup-link">
                    ليس لديك حساب؟ <a href="signup.html"><i class="fas fa-user-plus"></i> إنشاء حساب جديد</a>
                </div>
            </form>
        </div>
    </div>

    <footer>
        <p>Developed by Ahmed Moussa <span class="heart">❤</span></p>
    </footer>

    <script src="parent-login.js"></script>
    <!-- حماية الصفحة -->
<script>
    // منع فتح Console
    (function() {
        // منع F12
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'C' || e.key === 'J')) ||
                (e.ctrlKey && e.key === 'U') ||
                (e.metaKey && e.altKey && (e.key === 'I' || e.key === 'C'))) {
                e.preventDefault();
                return false;
            }
        });
        
        // منع النقر بزر الماوس الأيمن
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });
        
        // منع اختصار Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+Shift+C
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) {
                e.preventDefault();
                return false;
            }
            // منع Ctrl+U (عرض المصدر)
            if (e.ctrlKey && e.keyCode === 85) {
                e.preventDefault();
                return false;
            }
        });
        
        // تشويش على console
        if (typeof console !== 'undefined') {
            console.log = function() {};
            console.warn = function() {};
            console.error = function() {};
            console.info = function() {};
            console.debug = function() {};
        }
        
        // منع فتح DevTools عن طريق الكشف
        setInterval(function() {
            const start = performance.now();
            debugger;
            const end = performance.now();
            if (end - start > 100) {
                document.body.innerHTML = '<div style="position:fixed;top:0;left:0;right:0;bottom:0;background:white;z-index:99999;display:flex;align-items:center;justify-content:center;flex-direction:column;font-family:Tajawal,monospace;"><i class="fas fa-shield-alt" style="font-size:80px;color:#d4af37;margin-bottom:20px;"></i><h2 style="color:#1a4f6e;">تم تعطيل أدوات المطور</h2><p style="color:#64748b;">يرجى إغلاق أدوات المطور لإكمال العملية</p></div>';
                document.body.style.overflow = 'hidden';
            }
        }, 1000);
        
        // منع حفظ الصفحة (Ctrl+S)
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.keyCode === 83) {
                e.preventDefault();
                return false;
            }
        });
        
        // منع dragging الصور
        document.querySelectorAll('img').forEach(img => {
            img.setAttribute('draggable', 'false');
            img.addEventListener('dragstart', (e) => {
                e.preventDefault();
                return false;
            });
        });
        
        // إخفاء شريط العناوين (Address Bar) عند التمرير
        window.addEventListener('scroll', function() {
            window.scrollTo(0, 0);
        });
    })();
</script>
</body>
</html>
